<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code — Usage Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #252836;
    --border: #2e3247;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --accent: #6366f1;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --blue: #3b82f6;
    --orange: #f97316;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.6; }
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 22px; font-weight: 700; }
  h2 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
  h3 { font-size: 14px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .header-meta { color: var(--text2); font-size: 12px; text-align: right; }
  .stale-badge { background: var(--yellow); color: #000; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; }

  /* KPI Cards */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .kpi-label { color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .kpi-value { font-size: 28px; font-weight: 700; color: var(--accent); }
  .kpi-sub { color: var(--text2); font-size: 11px; margin-top: 4px; }

  /* Grid layouts */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .full-width { margin-bottom: 16px; }

  /* Panels */
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .panel canvas { max-height: 220px; }

  /* Alerts */
  .alert { border-radius: 6px; padding: 12px 14px; margin-bottom: 8px; font-size: 13px; }
  .alert-critical { background: rgba(239,68,68,0.12); border-left: 3px solid var(--red); }
  .alert-warning { background: rgba(234,179,8,0.12); border-left: 3px solid var(--yellow); }
  .alert-info { background: rgba(59,130,246,0.12); border-left: 3px solid var(--blue); }
  .alert-msg { font-weight: 600; margin-bottom: 2px; }
  .alert-rec { color: var(--text2); font-size: 12px; }
  .alert-badge { font-size: 10px; text-transform: uppercase; font-weight: 700; padding: 2px 6px; border-radius: 3px; margin-right: 6px; }
  .badge-critical { background: var(--red); color: #fff; }
  .badge-warning { background: var(--yellow); color: #000; }
  .badge-info { background: var(--blue); color: #fff; }
  .no-alerts { color: var(--green); font-size: 13px; padding: 12px 0; }
  details summary { cursor: pointer; color: var(--text2); font-size: 12px; margin-bottom: 8px; }

  /* AI Insights */
  .insights-content { line-height: 1.7; }
  .insights-content h1, .insights-content h2 { color: var(--accent); margin-top: 16px; margin-bottom: 8px; font-size: 15px; }
  .insights-content h3 { color: var(--text); font-size: 13px; margin-top: 12px; margin-bottom: 4px; }
  .insights-content p { color: var(--text); margin-bottom: 8px; }
  .insights-content ul, .insights-content ol { padding-left: 20px; margin-bottom: 8px; color: var(--text); }
  .insights-content table { border-collapse: collapse; width: 100%; margin-bottom: 8px; font-size: 12px; }
  .insights-content th { background: var(--surface2); color: var(--text2); padding: 6px 10px; text-align: left; border: 1px solid var(--border); }
  .insights-content td { padding: 5px 10px; border: 1px solid var(--border); }
  .insights-placeholder { color: var(--text2); font-style: italic; padding: 16px 0; font-size: 13px; }

  /* ROI panel */
  .roi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .roi-item { text-align: center; }
  .roi-val { font-size: 22px; font-weight: 700; color: var(--accent); }
  .roi-lbl { color: var(--text2); font-size: 11px; margin-top: 2px; }

  /* Config audit table */
  .audit-section { margin-bottom: 12px; }
  .tag { display: inline-block; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; font-size: 11px; margin: 2px; color: var(--text2); }
  .tag-used { border-color: var(--green); color: var(--green); }
  .tag-unused { border-color: var(--yellow); color: var(--yellow); }

  /* Detail table */
  .detail-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .detail-table th { background: var(--surface2); color: var(--text2); padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .detail-table th:hover { color: var(--text); }
  .detail-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); color: var(--text); }
  .detail-table tr:hover td { background: var(--surface2); }
  .status-completed { color: var(--green); }
  .status-failed { color: var(--red); }
  .status-timeout { color: var(--yellow); }
  .trend-up { color: var(--red); }
  .trend-down { color: var(--green); }
  .trend-stable { color: var(--text2); }

  /* Scrollable table wrapper */
  .table-scroll { overflow-x: auto; }
  @media (max-width: 900px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="header">
    <div>
      <h1>Claude Code — Usage Dashboard</h1>
      <div id="header-sub" style="color:var(--text2);font-size:12px;margin-top:4px;"></div>
    </div>
    <div class="header-meta" id="header-meta"></div>
  </div>

  <!-- KPI Cards -->
  <div class="kpi-grid" id="kpi-grid"></div>

  <!-- Alerts -->
  <div class="full-width panel" id="alerts-panel">
    <h2>🚨 Alerts</h2>
    <div id="alerts-list"></div>
  </div>

  <!-- AI Insights -->
  <div class="full-width panel" style="margin-bottom:16px;" id="insights-panel">
    <h2>🤖 AI Insights</h2>
    <div id="insights-content"></div>
  </div>

  <!-- Charts row 1 -->
  <div class="grid-2">
    <div class="panel">
      <h2>Coste USD (últimos 90d)</h2>
      <canvas id="chart-cost"></canvas>
    </div>
    <div class="panel">
      <h2>Tokens (últimos 90d)</h2>
      <canvas id="chart-tokens"></canvas>
    </div>
  </div>

  <!-- Charts row 2 -->
  <div class="grid-3">
    <div class="panel">
      <h2>Agentes</h2>
      <canvas id="chart-agents"></canvas>
    </div>
    <div class="panel">
      <h2>Skills usadas</h2>
      <canvas id="chart-skills"></canvas>
    </div>
    <div class="panel">
      <h2>Modelo</h2>
      <canvas id="chart-models"></canvas>
    </div>
  </div>

  <!-- ROI + Config audit -->
  <div class="grid-2">
    <div class="panel" id="roi-panel">
      <h2>ROI (30d)</h2>
      <div class="roi-grid" id="roi-grid"></div>
    </div>
    <div class="panel" id="config-panel">
      <h2>Config Audit</h2>
      <div id="config-audit"></div>
    </div>
  </div>

  <!-- Detail table (last 30d) -->
  <div class="full-width panel">
    <h2>Detalle — últimas sesiones</h2>
    <div class="table-scroll">
      <table class="detail-table" id="detail-table">
        <thead><tr>
          <th onclick="sortTable(0)">Fecha</th>
          <th onclick="sortTable(1)">Sesiones</th>
          <th onclick="sortTable(2)">Coste USD</th>
          <th onclick="sortTable(3)">Input M</th>
          <th onclick="sortTable(4)">Output M</th>
          <th onclick="sortTable(5)">Archivos</th>
          <th onclick="sortTable(6)">Duración h</th>
          <th onclick="sortTable(7)">OK</th>
          <th onclick="sortTable(8)">Fail</th>
          <th>Agentes</th>
        </tr></thead>
        <tbody id="detail-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// Embedded data from usage-snapshot.ts
const RAW = __DATA__;
const { daily, aggregates, alerts: alertsData, insights } = RAW;
const md = window.markdownit ? window.markdownit() : null;

// ── Helpers ──────────────────────────────────────────────────────────────────
const fmt = (n, d=2) => (typeof n === 'number' ? n.toFixed(d) : '—');
const fmtK = n => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'K' : String(n);
const last30 = () => daily.slice(-30);
const last90 = () => daily.slice(-90);

// ── Header ────────────────────────────────────────────────────────────────────
function renderHeader() {
  const { dataRange } = aggregates;
  const sub = document.getElementById('header-sub');
  const meta = document.getElementById('header-meta');

  let staleHtml = '';
  if (dataRange.staleDays > 7) {
    staleHtml = `<span class="stale-badge">Datos desactualizados: ${dataRange.staleDays}d</span> `;
  }
  sub.innerHTML = `${staleHtml}Rango: ${dataRange.earliest} → ${dataRange.latest} · ${daily.length} días`;
  meta.innerHTML = `Generado: ${new Date(aggregates.generatedAt).toLocaleString('es-ES')}<br>Ventana: 30d`;
}

// ── KPI Cards ─────────────────────────────────────────────────────────────────
function renderKPIs() {
  const r30 = last30();
  const mtdCost = r30.reduce((s, r) => s + r.totals.costUsd, 0);
  const mtdEvents = r30.reduce((s, r) => s + r.events, 0);
  const daysTracked = daily.length;
  const lastDay = daily[daily.length - 1];
  const critCount = (alertsData?.alerts ?? []).filter(a => a.severity === 'critical').length;

  const cards = [
    { label: 'Coste 30d', value: `$${fmt(mtdCost)}`, sub: `trend: ${aggregates.roi.costTrend}` },
    { label: 'Sesiones 30d', value: fmtK(aggregates.roi.totalSessions), sub: `${mtdEvents} eventos` },
    { label: 'Días registrados', value: daysTracked, sub: `${aggregates.dataRange.earliest} → ${aggregates.dataRange.latest}` },
    { label: 'Alertas críticas', value: critCount, sub: `${(alertsData?.alerts ?? []).length} total` },
  ];
  const grid = document.getElementById('kpi-grid');
  grid.innerHTML = cards.map(c =>
    `<div class="kpi-card"><div class="kpi-label">${c.label}</div><div class="kpi-value">${c.value}</div><div class="kpi-sub">${c.sub}</div></div>`
  ).join('');
}

// ── Alerts ────────────────────────────────────────────────────────────────────
function renderAlerts() {
  const alerts = alertsData?.alerts ?? [];
  const list = document.getElementById('alerts-list');
  if (alerts.length === 0) {
    list.innerHTML = '<div class="no-alerts">✓ Sin anomalías detectadas</div>';
    return;
  }
  const order = { critical: 0, warning: 1, info: 2 };
  const sorted = [...alerts].sort((a, b) => (order[a.severity] ?? 3) - (order[b.severity] ?? 3));

  // Group: show critical + warning directly, infos in collapsible
  const critical = sorted.filter(a => a.severity === 'critical');
  const warnings = sorted.filter(a => a.severity === 'warning');
  const infos = sorted.filter(a => a.severity === 'info');

  const renderAlert = a => `
    <div class="alert alert-${a.severity}">
      <div class="alert-msg"><span class="alert-badge badge-${a.severity}">${a.severity}</span>${a.message}</div>
      <div class="alert-rec">${a.recommendation}</div>
    </div>`;

  let html = [...critical, ...warnings].map(renderAlert).join('');
  if (infos.length > 0) {
    html += `<details><summary>${infos.length} info alert${infos.length > 1 ? 's' : ''}</summary>${infos.map(renderAlert).join('')}</details>`;
  }
  list.innerHTML = html;
}

// ── AI Insights ───────────────────────────────────────────────────────────────
function renderInsights() {
  const el = document.getElementById('insights-content');
  if (!insights || !insights.trim()) {
    el.innerHTML = '<div class="insights-placeholder">Ejecuta <code>/usage-insights</code> para generar narrativa IA con recomendaciones.</div>';
    return;
  }
  if (md) {
    el.innerHTML = `<div class="insights-content">${md.render(insights)}</div>`;
  } else {
    el.innerHTML = `<pre style="white-space:pre-wrap;font-size:13px;">${insights}</pre>`;
  }
}

// ── Charts ────────────────────────────────────────────────────────────────────
const CHART_DEFAULTS = {
  plugins: { legend: { labels: { color: '#94a3b8', font: { size: 11 } } } },
  scales: {
    x: { ticks: { color: '#94a3b8', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#2e3247' } },
    y: { ticks: { color: '#94a3b8', font: { size: 10 } }, grid: { color: '#2e3247' } },
  },
};

function shortDate(d) { return d.slice(5); } // MM-DD

function renderCostChart() {
  const rows = last90();
  new Chart(document.getElementById('chart-cost'), {
    type: 'line',
    data: {
      labels: rows.map(r => shortDate(r.date)),
      datasets: [{
        label: 'USD/día',
        data: rows.map(r => +r.totals.costUsd.toFixed(2)),
        borderColor: '#6366f1',
        backgroundColor: 'rgba(99,102,241,0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: rows.length > 30 ? 0 : 3,
      }]
    },
    options: { ...CHART_DEFAULTS, responsive: true, maintainAspectRatio: true }
  });
}

function renderTokensChart() {
  const rows = last90();
  new Chart(document.getElementById('chart-tokens'), {
    type: 'bar',
    data: {
      labels: rows.map(r => shortDate(r.date)),
      datasets: [
        { label: 'Input (M)', data: rows.map(r => +(r.totals.inputTokens/1e6).toFixed(2)), backgroundColor: 'rgba(59,130,246,0.7)', stack: 'tokens' },
        { label: 'Output (M)', data: rows.map(r => +(r.totals.outputTokens/1e6).toFixed(2)), backgroundColor: 'rgba(99,102,241,0.7)', stack: 'tokens' },
      ]
    },
    options: { ...CHART_DEFAULTS, responsive: true, maintainAspectRatio: true, scales: { ...CHART_DEFAULTS.scales, x: { ...CHART_DEFAULTS.scales.x, stacked: true }, y: { ...CHART_DEFAULTS.scales.y, stacked: true } } }
  });
}

function renderAgentsChart() {
  const agentTotals = {};
  for (const row of last30()) {
    for (const [agent, count] of Object.entries(row.byAgent || {})) {
      agentTotals[agent] = (agentTotals[agent] || 0) + count;
    }
  }
  const entries = Object.entries(agentTotals).sort((a, b) => b[1] - a[1]).slice(0, 8);
  const colors = ['#6366f1','#3b82f6','#22c55e','#f97316','#eab308','#ef4444','#8b5cf6','#06b6d4'];
  new Chart(document.getElementById('chart-agents'), {
    type: 'bar',
    data: {
      labels: entries.map(e => e[0]),
      datasets: [{ label: 'Sesiones', data: entries.map(e => e[1]), backgroundColor: colors }]
    },
    options: { ...CHART_DEFAULTS, indexAxis: 'y', responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } }
  });
}

function renderSkillsChart() {
  const skillTotals = {};
  for (const row of last30()) {
    for (const [skill, count] of Object.entries(row.bySkill || {})) {
      skillTotals[skill] = (skillTotals[skill] || 0) + count;
    }
  }
  const entries = Object.entries(skillTotals).sort((a, b) => b[1] - a[1]).slice(0, 8);
  if (entries.length === 0) {
    document.getElementById('chart-skills').parentElement.innerHTML += '<p style="color:var(--text2);font-size:12px;padding-top:8px;">Sin datos de skills en 30d</p>';
    return;
  }
  const colors = ['#6366f1','#3b82f6','#22c55e','#f97316','#eab308','#ef4444','#8b5cf6','#06b6d4'];
  new Chart(document.getElementById('chart-skills'), {
    type: 'bar',
    data: {
      labels: entries.map(e => e[0]),
      datasets: [{ label: 'Invocaciones', data: entries.map(e => e[1]), backgroundColor: colors }]
    },
    options: { ...CHART_DEFAULTS, indexAxis: 'y', responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } }
  });
}

function renderModelsChart() {
  const modelTotals = {};
  for (const row of last30()) {
    for (const [model, data] of Object.entries(row.byModel || {})) {
      if (!modelTotals[model]) modelTotals[model] = { sessions: 0, costUsd: 0 };
      modelTotals[model].sessions += data.primarySessions || data.sessions || 0;
      modelTotals[model].costUsd += data.costUsd || 0;
    }
  }
  const entries = Object.entries(modelTotals).sort((a, b) => b[1].sessions - a[1].sessions);
  const colors = { opus: '#6366f1', sonnet: '#3b82f6', haiku: '#22c55e', unknown: '#94a3b8' };
  new Chart(document.getElementById('chart-models'), {
    type: 'doughnut',
    data: {
      labels: entries.map(e => e[0]),
      datasets: [{
        data: entries.map(e => e[1].sessions),
        backgroundColor: entries.map(e => colors[e[0]] || '#94a3b8'),
      }]
    },
    options: { ...CHART_DEFAULTS, plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 11 } } } } }
  });
}

// ── ROI Panel ─────────────────────────────────────────────────────────────────
function renderROI() {
  const { roi } = aggregates;
  const items = [
    { val: `$${fmt(roi.costPerSession)}`, lbl: 'Coste/sesión' },
    { val: roi.totalFilesChanged > 0 ? `$${fmt(roi.costPerFileChanged)}` : '—', lbl: 'Coste/archivo' },
    { val: roi.costTrend, lbl: 'Tendencia 30d', cls: roi.costTrend.startsWith('+') ? 'trend-up' : roi.costTrend.startsWith('-') ? 'trend-down' : 'trend-stable' },
    { val: `$${fmt(roi.totalCostUsd)}`, lbl: 'Total 30d' },
    { val: roi.totalSessions, lbl: 'Sesiones 30d' },
    { val: roi.totalFilesChanged, lbl: 'Archivos 30d' },
  ];
  document.getElementById('roi-grid').innerHTML = items.map(i =>
    `<div class="roi-item"><div class="roi-val ${i.cls || ''}">${i.val}</div><div class="roi-lbl">${i.lbl}</div></div>`
  ).join('');
}

// ── Config Audit ──────────────────────────────────────────────────────────────
function renderConfigAudit() {
  const { config, budget } = aggregates;
  const usedSet = new Set(config.skillsUsedLast30d || []);
  const unusedArr = config.skillsUnusedLast30d || [];
  const skillsTotal = config.skills?.total ?? config.skillsAvailable ?? 0;
  const skillsBreakdown = config.skills
    ? `${config.skills.project}p · ${config.skills.user}u · ${config.skills.commandsProject}cmd · ${config.skills.commandsUser}cmd_u`
    : '';

  let html = '';

  html += `<div class="audit-section">
    <h3>Skills usadas (30d): ${usedSet.size}/${skillsTotal} <span style="color:var(--text2);font-size:11px;font-weight:400">${skillsBreakdown}</span></h3>
    <div>${[...usedSet].map(s => `<span class="tag tag-used">${s}</span>`).join('') || '<span class="tag">ninguna</span>'}</div>
  </div>`;

  if (unusedArr.length > 0) {
    html += `<div class="audit-section">
      <h3>Skills sin usar: ${unusedArr.length}</h3>
      <div>${unusedArr.map(s => `<span class="tag tag-unused">${s}</span>`).join('')}</div>
    </div>`;
  }

  html += `<div class="audit-section" style="margin-top:12px;">
    <h3>Budget</h3>
    <div style="font-size:12px;color:var(--text2);">Límite/día: <b style="color:var(--text)">$${budget.limitUsdPerDay}</b> · Días sobre límite: <b style="color:${budget.daysOverBudget > 0 ? 'var(--red)' : 'var(--green)'}">${budget.daysOverBudget}</b> · Máximo: <b style="color:var(--text)">$${fmt(budget.maxDayUsd)}</b> (${budget.maxDayDate})</div>
  </div>`;

  html += `<div class="audit-section" style="margin-top:8px;">
    <h3>Agentes usados (30d) — success rate per-agent</h3>
    <div>${(config.agentsUsedLast30d || []).map(a => {
      const rate = (aggregates.health?.agentSuccessRate?.[a] ?? 1) * 100;
      const count = aggregates.health?.agentSessionCounts?.[a] ?? 0;
      const cls = rate < 70 ? 'tag-unused' : 'tag-used';
      return `<span class="tag ${cls}" title="${count} sesiones">${a} ${rate.toFixed(0)}%</span>`;
    }).join('') || '<span class="tag">ninguno</span>'}</div>
  </div>`;

  const hooks = aggregates.config?.hooks;
  if (hooks) {
    html += `<div class="audit-section" style="margin-top:8px;">
      <h3>Hooks: ${hooks.registered} registered</h3>
      <div style="font-size:12px;color:var(--text2);">${(hooks.matchers || []).map(m => `<span class="tag">${m.event}: ${m.count}</span>`).join('')}</div>
    </div>`;
  }

  const topTools = aggregates.topToolsByDuration || [];
  if (topTools.length > 0) {
    html += `<div class="audit-section" style="margin-top:12px;">
      <h3>Top tools by duration (30d)</h3>
      <table style="width:100%;font-size:11px;border-collapse:collapse;">
        <thead><tr style="color:var(--text2);"><th style="text-align:left;padding:4px;">Tool</th><th style="text-align:right;padding:4px;">Calls</th><th style="text-align:right;padding:4px;">Avg ms</th><th style="text-align:right;padding:4px;">P95 ms</th><th style="text-align:right;padding:4px;">Fail %</th></tr></thead>
        <tbody>${topTools.slice(0, 8).map(t => `<tr>
          <td style="padding:3px 4px;">${t.tool}</td>
          <td style="text-align:right;padding:3px 4px;">${t.totalCalls}</td>
          <td style="text-align:right;padding:3px 4px;">${Math.round(t.avgMs)}</td>
          <td style="text-align:right;padding:3px 4px;">${Math.round(t.p95Ms)}</td>
          <td style="text-align:right;padding:3px 4px;color:${t.failureRate > 0.05 ? 'var(--red)' : 'var(--text2)'}">${(t.failureRate * 100).toFixed(1)}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
  }

  document.getElementById('config-audit').innerHTML = html;
}

// ── Detail Table ──────────────────────────────────────────────────────────────
let tableData = [];
let sortCol = 0, sortAsc = false;

function renderDetailTable() {
  tableData = last30().map(r => ({
    date: r.date,
    sessions: r.sessions,
    costUsd: r.totals.costUsd,
    inputM: r.totals.inputTokens / 1e6,
    outputM: r.totals.outputTokens / 1e6,
    files: r.totals.filesChanged,
    durationH: r.totals.durationMs / 3600000,
    completed: r.byStatus.completed,
    failed: r.byStatus.failed + r.byStatus.timeout,
    agents: Object.entries(r.byAgent || {}).sort((a,b) => b[1]-a[1]).slice(0,3).map(e => e[0]).join(', '),
  }));
  renderTableRows();
}

function renderTableRows() {
  const sorted = [...tableData].sort((a, b) => {
    const cols = ['date','sessions','costUsd','inputM','outputM','files','durationH','completed','failed'];
    const key = cols[sortCol] || 'date';
    const av = a[key], bv = b[key];
    return sortAsc ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
  });
  document.getElementById('detail-tbody').innerHTML = sorted.map(r => `
    <tr>
      <td>${r.date}</td>
      <td>${r.sessions}</td>
      <td>$${r.costUsd.toFixed(2)}</td>
      <td>${r.inputM.toFixed(1)}</td>
      <td>${r.outputM.toFixed(2)}</td>
      <td>${r.files}</td>
      <td>${r.durationH.toFixed(1)}</td>
      <td class="status-completed">${r.completed}</td>
      <td class="${r.failed > 0 ? 'status-failed' : ''}">${r.failed}</td>
      <td>${r.agents}</td>
    </tr>`).join('');
}

window.sortTable = function(col) {
  if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = false; }
  renderTableRows();
};
